[env:esp32cam]
; espressif32 6.x  →  ESP-IDF 5.x  →  mbedTLS 3.x  (kompatibel mit skuodi/libssh2_esp)
; espressif32 7.x  →  ESP-IDF 6.x  →  mbedTLS 4.x  (TF-PSA-Crypto, inkompatibel)
platform  = espressif32@6.9.0
board     = esp32cam
framework = espidf

monitor_speed          = 115200
board_upload.flash_size = 4MB
board_build.partitions  = huge_app.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3

; libssh2 wird automatisch über den IDF Component Manager geladen (src/idf_component.yml).
; Kein manueller Schritt nötig.

; Pre-Build-Script: generiert src/ssh_key_data.c aus src/ssh_private_key.pem
extra_scripts = pre:scripts/gen_ssh_key.py
